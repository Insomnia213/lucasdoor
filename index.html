<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width,initial-scale=1,viewport-fit=cover"
    >

    <meta name="theme-color" content="#0A0A0A">

    <title>LUCAS · CAPITAL</title>

    <meta
        name="description"
        content="Independent markets commentary, every day."
    >

    <meta property="og:title" content="Lucas · CAPITAL">

    <meta
        property="og:description"
        content="Independent markets commentary, every day."
    >

    <meta property="og:image" content="assets/portrait.jpg">

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<main class="page">

    <div
        class="ava"
        role="img"
        aria-label="Lucas"
    ></div>

    <div class="name">
        <b>Lucas</b> · CAPITAL
    </div>

    <h1>
        <span>Read the market.</span>
        <span class="em">Every day.</span>
    </h1>

    <p class="sub">
        Daily commentary on macro, commodities and digital assets.
    </p>

    <a
        class="cta"
        href="https://t.me/+tyNEBRll7vQ3NTI6"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Open Telegram channel"
    >
        <span>Open on Telegram</span>
        <span class="arrow">→</span>
    </a>

    <button
        class="alt"
        id="openAlt"
        type="button"
    >
        <u>Don't have Telegram?</u>
    </button>

</main>

<div
    class="backdrop"
    id="backdrop"
    role="dialog"
    aria-modal="true"
>

    <div class="sheet">

        <h2>How to install Telegram</h2>

        <p class="sub2">
            Install Telegram and return to this page.
        </p>

        <div class="stores">

            <a
                class="store"
                href="https://apps.apple.com/app/telegram-messenger/id686449807"
                target="_blank"
                rel="noopener noreferrer"
            >
                App Store
            </a>

            <a
                class="store"
                href="https://play.google.com/store/apps/details?id=org.telegram.messenger"
                target="_blank"
                rel="noopener noreferrer"
            >
                Google Play
            </a>

        </div>

        <button
            class="close"
            id="closeM"
            type="button"
        >
            Close
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
